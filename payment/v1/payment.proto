syntax = "proto3";

package payment.v1;

option go_package = "github.com/usenbai-nur/ADP2_asik2_generated/payment/v1;paymentv1";

import "google/protobuf/timestamp.proto";

service PaymentService {
  rpc ProcessPayment(PaymentRequest) returns (PaymentResponse);
  rpc GetPaymentByOrderID(GetPaymentByOrderIDRequest) returns (PaymentResponse);
  rpc GetPaymentStats(GetPaymentStatsRequest) returns (PaymentStats);
}

enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PAYMENT_STATUS_AUTHORIZED = 1;
  PAYMENT_STATUS_DECLINED = 2;
}

message PaymentRequest {
  string order_id = 1;
  int64 amount = 2;
  string customer_email = 3;
}

message GetPaymentByOrderIDRequest {
  string order_id = 1;
}

message GetPaymentStatsRequest {}

message PaymentResponse {
  string id = 1;
  string order_id = 2;
  string transaction_id = 3;
  int64 amount = 4;
  PaymentStatus status = 5;
  google.protobuf.Timestamp created_at = 6;
}

message PaymentStats {
  int64 total_count = 1;
  int64 authorized_count = 2;
  int64 declined_count = 3;
  int64 total_amount = 4;
}
